<style>
/* ---------- Layout ---------- */
.wrap{max-width:1280px;margin:0 auto;padding:0 32px}

/* ---------- Top bar ---------- */
.topbar{position:sticky;top:0;z-index:20;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(20,18,28,.72);border-bottom:1px solid var(--border-subtle)}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;height:64px}
.brand{font-family:var(--font-display);font-size:20px;color:var(--text-primary);display:flex;align-items:center;gap:10px}
.brand .spark{color:var(--fuchsia);font-size:14px}
.temp-tag{font-family:var(--font-ui);font-size:10px;font-weight:var(--weight-ui-semibold);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--champagne-bright);border:1px solid var(--border-foil);border-radius:var(--radius-pill);padding:4px 10px}
.search{flex:1;max-width:360px}
.search input{width:100%;box-sizing:border-box;background:var(--surface-raised);border:1px solid var(--border-strong);border-radius:var(--radius-1);color:var(--text-primary);font-family:var(--font-ui);font-size:var(--type-small);padding:10px 14px}
.search input::placeholder{color:var(--text-tertiary)}
.search input:focus{outline:none;border-color:var(--champagne);box-shadow:var(--shadow-foil-glow)}

/* ---------- Intro ---------- */
.intro{padding-top:40px;padding-bottom:20px}
.intro h1{font-size:var(--type-title);color:var(--pearl);margin-bottom:8px}
.intro p{font-family:var(--font-ui);color:var(--text-secondary);margin:0;font-size:var(--type-small)}

/* ---------- Filter chips ---------- */
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:20px 0 28px}
.chip{font-family:var(--font-ui);font-size:var(--type-small);color:var(--text-secondary);background:transparent;border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:7px 14px;cursor:pointer;transition:border-color var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out)}
.chip:hover{border-color:var(--border-foil);color:var(--text-primary)}
.chip.active{background:rgba(198,161,91,.14);border-color:var(--border-foil);color:var(--champagne-bright)}
.chip .n{color:var(--text-tertiary);margin-left:6px;font-size:11px}

/* ---------- Grid ---------- */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding-bottom:96px}
.card{background:var(--surface-raised);border:1px solid var(--border-subtle);border-radius:var(--radius-2);overflow:hidden;display:flex;flex-direction:column;transition:border-color var(--dur-base) var(--ease-out)}
.card:hover{border-color:var(--border-foil)}
.card-img{aspect-ratio:1/1;position:relative;background:#0B0910;display:flex;align-items:center;justify-content:center}
.card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#fff}
.card-img .ph{color:rgba(243,238,228,.28);font-size:var(--type-micro);letter-spacing:var(--tracking-caps);text-transform:uppercase}
.swatches{position:absolute;bottom:10px;left:10px;display:flex;gap:5px;z-index:1}
.swatch{width:16px;height:16px;border-radius:var(--radius-pill);border:1px solid rgba(243,238,228,.5);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.more-colors{font-family:var(--font-ui);font-size:10px;color:var(--pearl);background:rgba(20,18,28,.7);border-radius:var(--radius-pill);padding:2px 7px;align-self:center}
.card-body{padding:14px 16px;display:flex;flex-direction:column;gap:5px;flex:1}
.card-cat{color:var(--text-tertiary)}
.card-name{font-family:var(--font-display);font-size:17px;color:var(--pearl);line-height:1.2}
.card-mat{font-family:var(--font-ui);font-size:var(--type-small);color:var(--text-secondary)}
.card-meta{margin-top:auto;padding-top:10px;display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.card-price{font-family:var(--font-display);font-size:14px;color:var(--text-accent)}
.card-link{font-family:var(--font-ui);font-size:11px;color:var(--text-tertiary)}
.card-link:hover{color:var(--champagne)}

.empty{padding:60px 0;text-align:center;color:var(--text-tertiary);font-family:var(--font-ui)}

@media (max-width:1024px){.grid{grid-template-columns:repeat(3,1fr)}}
@media (max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}.search{display:none}}
@media (max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>

<script>
const SWATCH = {
  black:'#111', negro:'#111', white:'#f5f5f0', blanco:'#f5f5f0', natural:'#e8dcc2',
  brown:'#5a3d28', chocolate:'#3d2817', tan:'#c9a877', saddle:'#7a4e2d', tobacco:'#6b4423',
  rust:'#9c4a24', pecan:'#8a5a34', wheat:'#e0c48a', sand:'#d8c39a', khaki:'#b3a276',
  grey:'#8a8a8a', gray:'#8a8a8a', silver:'#c8c8c8', charcoal:'#3a3a3a', pewter:'#96958f',
  navy:'#2a3550', blue:'#3f5c8a', turquoise:'#3aa8a0', red:'#a83232', wine:'#6e2440',
  green:'#4a6741', olive:'#6b6b3a', pink:'#d98aa8', purple:'#6a4a7a', cream:'#efe6d0',
  ivory:'#efe9db', bone:'#e7ded0', mocha:'#6f5040', coffee:'#4a3527', silverbelly:'#c7b48f',
  buckskin:'#c9a877', pecos:'#b08a5a', acorn:'#7a5230', walnut:'#5a3d28', camel:'#c19a6b'
};
function swatchColor(name){
  if(!name) return '#8a7f6f';
  const k = name.toLowerCase();
  for(const key in SWATCH){ if(k.includes(key)) return SWATCH[key]; }
  return '#8a7f6f';
}
function priceLabel(v){
  const priced = v.find(x=>x.price!=null);
  if(priced) return (priced.currency==='USD'?'$':'')+priced.price;
  return 'Bajo consulta';
}

let ALL = [], activeCat = null, query = '';

(function(){
  try{
    const data = JSON.parse(document.getElementById('catalogo-data').textContent);
    ALL = data.products;
    buildChips();
    render();
    document.getElementById('summary').textContent =
      `${ALL.length} sombreros importados de Bullhide Hats · imágenes desde el origen · precios pendientes de sincronizar`;
  }catch(e){
    document.getElementById('summary').textContent = 'Error al leer los datos incrustados: '+e.message;
  }
})();

function buildChips(){
  const counts = {};
  ALL.forEach(p=>p.categories.forEach(c=>counts[c]=(counts[c]||0)+1));
  const cats = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  const el = document.getElementById('chips');
  const chip = (label,cat,n)=>`<button class="chip${cat===activeCat?' active':''}" data-cat="${cat===null?'':encodeURIComponent(cat)}">${label}${n!=null?`<span class="n">${n}</span>`:''}</button>`;
  el.innerHTML = chip('Todos', null, ALL.length) + cats.map(c=>chip(c, c, counts[c])).join('');
  el.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{
    const raw=b.getAttribute('data-cat');
    activeCat = raw ? decodeURIComponent(raw) : null;
    buildChips(); render();
  });
}

function render(){
  const grid = document.getElementById('grid');
  let items = ALL;
  if(activeCat) items = items.filter(p=>p.categories.includes(activeCat));
  if(query){
    const q=query.toLowerCase();
    items = items.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.material||'').toLowerCase().includes(q));
  }
  if(!items.length){ grid.innerHTML='<div class="empty">Sin resultados.</div>'; return; }
  grid.innerHTML = items.map(cardHTML).join('');
}

function cardHTML(p){
  const firstImg = (p.variants.find(v=>v.images&&v.images.length)||{}).images?.[0];
  const colors = p.variants.map(v=>v.color).filter(Boolean);
  const shown = colors.slice(0,4);
  const extra = colors.length - shown.length;
  const link = (p.variants.find(v=>v.url)||{}).url;
  const cat = p.categories[0] || 'Bullhide';
  return `<article class="card">
    <div class="card-img">
      ${firstImg?`<img loading="lazy" src="${firstImg}" alt="${(p.name||'').replace(/"/g,'')}">`:'<span class="ph">Sin imagen</span>'}
      ${shown.length?`<div class="swatches">${shown.map(c=>`<span class="swatch" title="${c}" style="background:${swatchColor(c)}"></span>`).join('')}${extra>0?`<span class="more-colors">+${extra}</span>`:''}</div>`:''}
    </div>
    <div class="card-body">
      <span class="rr-caps card-cat">${cat}</span>
      <span class="card-name">${p.name||'—'}</span>
      ${p.material?`<span class="card-mat">${p.material}</span>`:''}
      <div class="card-meta">
        <span class="card-price">${priceLabel(p.variants)}</span>
        ${link?`<a class="card-link" href="${link}" target="_blank" rel="noopener">Ver origen ↗</a>`:''}
      </div>
    </div>
  </article>`;
}

document.getElementById('q').addEventListener('input', e=>{ query=e.target.value.trim(); render(); });
</script>
