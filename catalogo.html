<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Catalog — Rhinestone Row</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ---------- Layout ---------- */
.wrap{max-width:1280px;margin:0 auto;padding:0 32px}

/* ---------- Nav ---------- */
.nav{position:fixed;top:0;left:0;right:0;z-index:30;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(20,18,28,.72);border-bottom:1px solid var(--border-subtle)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo{font-family:var(--font-display);font-size:20px;color:var(--text-primary);letter-spacing:.01em}
.nav-logo:hover{opacity:1}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{font-family:var(--font-ui);font-size:var(--type-small);color:var(--text-secondary)}
.nav-links a:hover{color:var(--text-primary);opacity:1}
.nav-links a.active{color:var(--champagne)}
.nav-cat-mobile{display:none;font-family:var(--font-ui);font-size:var(--type-small);font-weight:var(--weight-ui-semibold);letter-spacing:.02em;color:var(--champagne);border:1px solid var(--border-foil);padding:8px 16px}
.nav-tryon{white-space:nowrap}
.nav-tryon.has-picks{color:var(--champagne)}
.nav-badge{min-width:19px;height:19px;padding:0 5px;border-radius:var(--radius-pill);background:var(--champagne);color:var(--ink);font-family:var(--font-ui);font-size:11px;font-weight:var(--weight-ui-semibold);line-height:1;vertical-align:middle;margin-left:2px;display:none;align-items:center;justify-content:center}
.nav-tryon.has-picks .nav-badge{display:inline-flex}
.nav-badge.pulse{animation:badgePulse .7s var(--ease-out)}
@keyframes badgePulse{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(198,161,91,.6)}50%{transform:scale(1.35);box-shadow:0 0 0 9px rgba(198,161,91,0)}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(198,161,91,0)}}

/* ---------- Intro ---------- */
.intro{padding-top:104px;padding-bottom:8px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
.intro-copy{max-width:560px;display:flex;flex-direction:column;gap:8px}
.intro-copy .rr-caps{color:var(--champagne)}
.intro h1{font-size:var(--type-title);color:var(--pearl)}
.intro p{font-family:var(--font-ui);color:var(--text-secondary);margin:0;font-size:var(--type-small)}
.search{flex:1;min-width:220px;max-width:340px}
.search input{width:100%;box-sizing:border-box;background:var(--surface-raised);border:1px solid var(--border-strong);border-radius:var(--radius-1);color:var(--text-primary);font-family:var(--font-ui);font-size:var(--type-small);padding:11px 14px}
.search input::placeholder{color:var(--text-tertiary)}
.search input:focus{outline:none;border-color:var(--champagne);box-shadow:var(--shadow-foil-glow)}

/* ---------- Filter chips ---------- */
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:22px 0 26px;position:sticky;top:64px;z-index:20;background:linear-gradient(180deg,var(--surface-base) 70%,rgba(20,18,28,0));backdrop-filter:blur(6px)}
.chip{font-family:var(--font-ui);font-size:var(--type-small);color:var(--text-secondary);background:transparent;border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:7px 14px;cursor:pointer;transition:border-color var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out)}
.chip:hover{border-color:var(--border-foil);color:var(--text-primary)}
.chip.active{background:rgba(198,161,91,.14);border-color:var(--border-foil);color:var(--champagne-bright)}
.chip .n{color:var(--text-tertiary);margin-left:6px;font-size:11px}

/* ---------- Grid ---------- */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding-bottom:140px}
.card{background:var(--surface-raised);border:1px solid var(--border-subtle);border-radius:var(--radius-2);overflow:hidden;display:flex;flex-direction:column;transition:border-color var(--dur-base) var(--ease-out)}
.card:hover{border-color:var(--border-foil)}
.card.selected{border-color:var(--champagne)}
.card-img{aspect-ratio:1/1;position:relative;background:#fff;display:flex;align-items:center;justify-content:center}
.card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card-img .ph{color:rgba(20,18,28,.35);font-size:var(--type-micro);letter-spacing:var(--tracking-caps);text-transform:uppercase}
.swatches{position:absolute;bottom:10px;left:10px;display:flex;gap:5px;z-index:1}
.swatch{width:16px;height:16px;border-radius:var(--radius-pill);border:1px solid rgba(243,238,228,.5);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.more-colors{font-family:var(--font-ui);font-size:10px;color:var(--pearl);background:rgba(20,18,28,.7);border-radius:var(--radius-pill);padding:2px 7px;align-self:center}
.card-check{position:absolute;top:10px;right:10px;z-index:2;width:34px;height:34px;border-radius:var(--radius-pill);border:1px solid var(--border-strong);background:rgba(20,18,28,.72);color:var(--pearl);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--dur-fast) var(--ease-out),border-color var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out)}
.card-check:hover{border-color:var(--champagne);color:var(--champagne)}
.card-check .ic-plus{display:block}
.card-check .ic-check{display:none}
.card.selected .card-check{background:var(--champagne);border-color:var(--champagne);color:var(--ink)}
.card.selected .card-check .ic-plus{display:none}
.card.selected .card-check .ic-check{display:block}
.card-body{padding:14px 16px;display:flex;flex-direction:column;gap:5px;flex:1}
.card-cat{color:var(--text-tertiary)}
.card-name{font-family:var(--font-display);font-size:17px;color:var(--pearl);line-height:1.2}
.card-mat{font-family:var(--font-ui);font-size:var(--type-small);color:var(--text-secondary)}
.card-meta{margin-top:auto;padding-top:10px;display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.card-price{font-family:var(--font-display);font-size:14px;color:var(--text-accent)}
.card-link{font-family:var(--font-ui);font-size:11px;color:var(--text-tertiary)}
.card-link:hover{color:var(--champagne)}
.empty{padding:60px 0;text-align:center;color:var(--text-tertiary);font-family:var(--font-ui)}

/* ---------- Selection bar ---------- */
.selbar{position:fixed;left:0;right:0;bottom:0;z-index:40;transform:translateY(120%);transition:transform var(--dur-base) var(--ease-out);background:rgba(20,18,28,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border-foil)}
.selbar.show{transform:translateY(0)}
.selbar-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0}
.selbar-info{display:flex;align-items:center;gap:12px;font-family:var(--font-ui);color:var(--text-secondary);font-size:var(--type-small)}
.selbar-count{font-family:var(--font-display);font-size:22px;color:var(--pearl)}
.selbar-thumbs{display:flex;gap:6px}
.selbar-thumbs img{width:38px;height:38px;object-fit:cover;border-radius:var(--radius-1);background:#fff;border:1px solid var(--border-subtle)}
.selbar-actions{display:flex;align-items:center;gap:12px}
.selbar-clear{font-family:var(--font-ui);font-size:var(--type-small);color:var(--text-tertiary);background:none;border:none;cursor:pointer}
.selbar-clear:hover{color:var(--text-secondary)}
.btn{font-family:var(--font-ui);font-weight:var(--weight-ui-semibold);letter-spacing:.02em;cursor:pointer;border:1px solid transparent;border-radius:var(--radius-0);display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 26px;font-size:14px;transition:background var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out)}
.btn-foil{background:var(--champagne);color:var(--ink)}
.btn-foil:hover{background:var(--champagne-bright);opacity:1;color:var(--ink)}

@media (max-width:1024px){.grid{grid-template-columns:repeat(3,1fr)}}
@media (max-width:768px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .nav-links{display:none}
  .nav-cat-mobile{display:inline-flex}
  .selbar-thumbs{display:none}
}
@media (max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <a href="index.html" class="nav-logo">Rhinestone Row</a>
    <div class="nav-links">
      <a href="index.html#edit">The edit</a>
      <a href="catalogo.html" class="active">Catalog</a>
      <a href="probador.html" class="nav-tryon">Try-On <span class="nav-badge">0</span></a>
      <a href="index.html#curation">Curation</a>
    </div>
    <a href="probador.html" class="nav-cat-mobile nav-tryon">Try-On <span class="nav-badge">0</span></a>
  </div>
</nav>

<div class="wrap">
  <section class="intro">
    <div class="intro-copy">
      <span class="rr-caps">✦ The catalog</span>
      <h1>The whole lineup.</h1>
      <p id="summary">Loading hats…</p>
    </div>
    <div class="search"><input id="q" type="search" placeholder="Search by name or material…" autocomplete="off"></div>
  </section>
  <div class="chips" id="chips"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="selbar" id="selbar">
  <div class="wrap selbar-inner">
    <div class="selbar-info">
      <span class="selbar-count" id="selCount">0</span>
      <span>picked for the fitting room</span>
      <div class="selbar-thumbs" id="selThumbs"></div>
    </div>
    <div class="selbar-actions">
      <button class="selbar-clear" id="selClear">Clear</button>
      <a class="btn btn-foil" id="selGo" href="probador.html">Try them on →</a>
    </div>
  </div>
</div>

<script>
const NON_HAT = new Set(['Hat Care Supplies', 'Promotional Materials', 'Western Shirts']);
const MAX_SELECT = 6;
const SEL_KEY = 'rr_tryon_selection';

const SWATCH = {
  black:'#111', negro:'#111', white:'#f5f5f0', blanco:'#f5f5f0', natural:'#e8dcc2',
  brown:'#5a3d28', chocolate:'#3d2817', tan:'#c9a877', saddle:'#7a4e2d', tobacco:'#6b4423',
  rust:'#9c4a24', pecan:'#8a5a34', wheat:'#e0c48a', sand:'#d8c39a', khaki:'#b3a276',
  grey:'#8a8a8a', gray:'#8a8a8a', silver:'#c8c8c8', charcoal:'#3a3a3a', pewter:'#96958f',
  navy:'#2a3550', blue:'#3f5c8a', turquoise:'#3aa8a0', red:'#a83232', wine:'#6e2440',
  green:'#4a6741', olive:'#6b6b3a', pink:'#d98aa8', purple:'#6a4a7a', cream:'#efe6d0',
  ivory:'#efe9db', bone:'#e7ded0', mocha:'#6f5040', coffee:'#4a3527', silverbelly:'#c7b48f',
  buckskin:'#c9a877', pecos:'#b08a5a', acorn:'#7a5230', walnut:'#5a3d28', camel:'#c19a6b'
};
function swatchColor(name){
  if(!name) return '#8a7f6f';
  const k = name.toLowerCase();
  for(const key in SWATCH){ if(k.includes(key)) return SWATCH[key]; }
  return '#8a7f6f';
}
function priceLabel(v){
  const priced = v.find(x=>x.price!=null);
  if(priced) return (priced.currency==='USD'?'$':'')+priced.price;
  return 'On request';
}
const esc = s => (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const keyOf = p => p.ref || p.name;
function firstImage(p){ const v = (p.variants||[]).find(x=>x.images&&x.images.length); return v ? v.images[0] : null; }

let ALL = [], activeCat = null, query = '';
const selection = new Map();

try { JSON.parse(sessionStorage.getItem(SEL_KEY) || '[]').forEach(x => selection.set(x.ref, x)); } catch {}
function saveSelection(){ sessionStorage.setItem(SEL_KEY, JSON.stringify([...selection.values()])); }
function updateNavBadge(pulse){
  const n = selection.size;
  document.querySelectorAll('.nav-tryon').forEach(link=>{
    link.classList.toggle('has-picks', n > 0);
    const b = link.querySelector('.nav-badge');
    if(b){ b.textContent = n; if(pulse){ b.classList.remove('pulse'); void b.offsetWidth; b.classList.add('pulse'); } }
  });
}

/* preselect a category from ?cat= (home menu links here) */
const wantedCat = new URLSearchParams(location.search).get('cat');

(async function(){
  try{
    const res = await fetch('catalogo.json');
    const data = await res.json();
    ALL = (data.products || []).filter(p => (p.categories||[]).some(c => !NON_HAT.has(c)) && firstImage(p));
    if (wantedCat && ALL.some(p => catsOfProduct(p).includes(wantedCat))) activeCat = wantedCat;
    buildChips();
    render();
    document.getElementById('summary').textContent = `${ALL.length} hats from Bullhide · tap ✓ to try one on`;
    updateSelbar();
    updateNavBadge(false);
  }catch(e){
    document.getElementById('summary').textContent = "Couldn't load the catalog: " + e.message;
  }
})();

function catsOfProduct(p){ return (p.categories||[]).filter(c => !NON_HAT.has(c)); }

function buildChips(){
  const counts = {};
  ALL.forEach(p => catsOfProduct(p).forEach(c => counts[c] = (counts[c]||0)+1));
  const cats = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  const el = document.getElementById('chips');
  const chip = (label,cat,n)=>`<button class="chip${cat===activeCat?' active':''}" data-cat="${cat===null?'':encodeURIComponent(cat)}">${label}${n!=null?`<span class="n">${n}</span>`:''}</button>`;
  el.innerHTML = chip('All', null, ALL.length) + cats.map(c=>chip(c, c, counts[c])).join('');
  el.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{
    const raw=b.getAttribute('data-cat');
    activeCat = raw ? decodeURIComponent(raw) : null;
    buildChips(); render();
  });
}

function render(){
  const grid = document.getElementById('grid');
  let items = ALL;
  if(activeCat) items = items.filter(p=>catsOfProduct(p).includes(activeCat));
  if(query){
    const q=query.toLowerCase();
    items = items.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.material||'').toLowerCase().includes(q));
  }
  if(!items.length){ grid.innerHTML='<div class="empty">No matches.</div>'; return; }
  grid.innerHTML = items.map(cardHTML).join('');
  grid.querySelectorAll('.card-check').forEach(btn=>btn.addEventListener('click', onToggle));
}

function cardHTML(p){
  const img = firstImage(p);
  const colors = (p.variants||[]).map(v=>v.color).filter(Boolean);
  const shown = colors.slice(0,4);
  const extra = colors.length - shown.length;
  const link = ((p.variants||[]).find(v=>v.url)||{}).url;
  const cat = catsOfProduct(p)[0] || 'Bullhide';
  const k = keyOf(p);
  const on = selection.has(k);
  return `<article class="card${on?' selected':''}" data-key="${esc(k)}">
    <div class="card-img">
      ${img?`<img loading="lazy" src="${esc(img)}" alt="${esc(p.name)}">`:'<span class="ph">No image</span>'}
      <button class="card-check" data-key="${esc(k)}" aria-label="Add to try-on" title="Try it on">
        <span class="ic-plus">✚</span><span class="ic-check">✓</span>
      </button>
      ${shown.length?`<div class="swatches">${shown.map(c=>`<span class="swatch" title="${esc(c)}" style="background:${swatchColor(c)}"></span>`).join('')}${extra>0?`<span class="more-colors">+${extra}</span>`:''}</div>`:''}
    </div>
    <div class="card-body">
      <span class="rr-caps card-cat">${esc(cat)}</span>
      <span class="card-name">${esc(p.name)||'—'}</span>
      ${p.material?`<span class="card-mat">${esc(p.material)}</span>`:''}
      <div class="card-meta">
        <span class="card-price">${priceLabel(p.variants||[])}</span>
        ${link?`<a class="card-link" href="${esc(link)}" target="_blank" rel="noopener">Source ↗</a>`:''}
      </div>
    </div>
  </article>`;
}

function onToggle(e){
  e.preventDefault();
  const k = e.currentTarget.getAttribute('data-key');
  const card = e.currentTarget.closest('.card');
  let added = false;
  if(selection.has(k)){
    selection.delete(k);
    card.classList.remove('selected');
  } else {
    if(selection.size >= MAX_SELECT){
      document.getElementById('selCount').animate([{color:'var(--fuchsia)'},{color:'var(--pearl)'}], {duration:900});
      return;
    }
    const p = ALL.find(x=>keyOf(x)===k);
    if(!p) return;
    selection.set(k, {
      ref: k, name: p.name || '', material: p.material || '',
      image: firstImage(p), category: catsOfProduct(p)[0] || '',
      url: ((p.variants||[]).find(v=>v.url)||{}).url || ''
    });
    card.classList.add('selected');
    added = true;
  }
  saveSelection();
  updateSelbar();
  updateNavBadge(added);
}

function updateSelbar(){
  const n = selection.size;
  document.getElementById('selCount').textContent = n;
  document.getElementById('selbar').classList.toggle('show', n > 0);
  document.getElementById('selThumbs').innerHTML =
    [...selection.values()].slice(0,6).map(s=>`<img src="${esc(s.image)}" alt="${esc(s.name)}">`).join('');
}

document.getElementById('selClear').addEventListener('click', ()=>{
  selection.clear(); saveSelection(); updateSelbar();
  document.querySelectorAll('.card.selected').forEach(c=>c.classList.remove('selected'));
});
document.getElementById('selGo').addEventListener('click', ()=>{ saveSelection(); });
document.getElementById('q').addEventListener('input', e=>{ query=e.target.value.trim(); render(); });
</script>
</body>
</html>
